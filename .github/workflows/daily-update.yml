name: Daily Repository Update - 21f3002106@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create daily commit
        run: |
          echo "Run at $(date)" >> daily-log.txt
          
          git config user.name "github-actions"
          git config user.email "21f3002106@ds.study.iitm.ac.in"

          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
          
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
