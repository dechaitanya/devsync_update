name: Daily Repository Update

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily_update:
    name: 21f3002106@ds.study.iitm.ac.in
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Create daily commit
        run: |
          echo "Run at $(date +'%Y-%m-%d %H:%M:%S')" >> daily-log.txt
          
          git config user.name "github-actions"
          git config user.email "21f3002106@ds.study.iitm.ac.in"
          
          git add daily-log.txt

          git commit -m "Automated daily update" || echo "Nothing to commit"
          
          git push
          
          git commit -m "Automated daily update" || echo "Nothing to commit"
          
          git push
